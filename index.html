<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DermaMatch — Tu piel en manos expertas</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="layout">
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo" onclick="App.navigate('home')">DermaMatch</div>
        <button class="sidebar-close" id="sidebarClose" onclick="App.toggleSidebar()">✕</button>
      </div>
      <nav class="sidebar-nav">
        <a class="sidebar-item" data-route="test" onclick="App.navigate('test')">
          <span class="sidebar-icon">🧪</span>
          <span>Test</span>
        </a>
        <a class="sidebar-item" data-route="productos" onclick="App.navigate('productos')">
          <span class="sidebar-icon">🧴</span>
          <span>Productos</span>
        </a>
        <a class="sidebar-item" data-route="diary" onclick="App.navigate('diary')">
          <span class="sidebar-icon">📓</span>
          <span>Skin-Diary</span>
        </a>
        <a class="sidebar-item" data-route="consultas" onclick="App.navigate('consultas')">
          <span class="sidebar-icon">👩‍⚕️</span>
          <span>Consultas</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user" onclick="App.navigate('profile')">
          <span class="sidebar-icon">👤</span>
          <span id="sidebarUserName">Mi Perfil</span>
        </div>
        <div class="sidebar-links">
          <a class="sidebar-link" onclick="App.navigate('privacidad')">🔒 Privacidad</a>
          <a class="sidebar-link" onclick="App.navigate('terminos')">📋 Términos</a>
        </div>
      </div>
    </aside>

    <div id="sidebarOverlay" onclick="App.toggleSidebar()"></div>

    <div id="mainArea">
      <header id="header">
        <div class="header-left">
          <button class="hamburger" id="hamburger" onclick="App.toggleSidebar()">☰</button>
          <div class="logo logo-header" onclick="App.navigate('home')">DermaMatch</div>
        </div>
        <div class="header-right">
          <button class="header-icon" onclick="App.navigate('cart')" title="Carrito">
            🛒<span class="header-badge" id="cartBadge"></span>
          </button>
          <button class="header-icon" onclick="App.navigate('favorites')" title="Favoritos">
            ♥<span class="header-badge" id="favBadge"></span>
          </button>
          <button class="header-icon" onclick="App.navigate('contacto')" title="Contacto">✉</button>
          <button class="header-icon" onclick="App.navigate('profile')" title="Perfil">👤</button>
          <button class="header-icon" id="loginBtn" onclick="App.showLogin()" title="Login/Registro">🔑</button>
        </div>
      </header>

      <main id="app"></main>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/products.js"></script>
  <script src="js/routineEngine.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/skin-diary.js"></script>
  <script src="js/consultas.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
